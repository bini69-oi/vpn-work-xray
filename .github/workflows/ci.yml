name: CI

on:
  push:
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Secret scan
        run: make secret-scan

  bot-quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    defaults:
      run:
        working-directory: apps/vpn-telegram-bot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            apps/vpn-telegram-bot/requirements.txt
            apps/vpn-telegram-bot/requirements-dev.txt

      - name: Install bot deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff
        run: python -m ruff check vpn_bot tests

      - name: Mypy
        run: python -m mypy vpn_bot

      - name: Pytest + coverage gate (80%)
        run: python -m pytest -v --tb=short --cov=vpn_bot --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage artifact
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: bot-coverage
          path: apps/vpn-telegram-bot/.coverage*
