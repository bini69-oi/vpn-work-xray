name: CI

on:
  push:
  pull_request:

jobs:
  test-lint:
    runs-on: ubuntu-latest
    env:
      MIN_COVERAGE: "80.0"
      GOLANGCI_LINT_VERSION: "v1.64.8"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}

      - name: Secret scan
        run: make secret-scan

      - name: Run full verify pipeline
        run: make verify

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-out
          path: coverage.out

  bot-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            apps/vpn-telegram-bot/requirements.txt
            apps/vpn-telegram-bot/requirements-dev.txt

      - name: Install bot deps
        working-directory: apps/vpn-telegram-bot
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        working-directory: apps/vpn-telegram-bot
        run: python -m pytest -v --tb=short
