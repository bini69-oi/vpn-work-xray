name: CI

on:
  push:
  pull_request:

jobs:
  test-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: make test

      - name: Run coverage report
        run: make cover

      - name: Run lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          make lint
