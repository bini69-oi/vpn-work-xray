groups:
  - name: vpn-product-alerts
    rules:
      - alert: VPNAPIHigh5xxRate
        expr: sum(rate(vpn_api_5xx_total[5m])) > 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High API 5xx rate"
      - alert: VPNApply3XUIFailures
        expr: sum(rate(vpn_apply_3xui_total{result="failure"}[10m])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "apply-to-3x-ui failures detected"
      - alert: VPNSyncLagTooHigh
        expr: max(vpn_sync_lag_seconds) > 300
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "sync lag exceeds 5 minutes"
